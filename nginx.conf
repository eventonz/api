# /etc/nginx/sites-available/evento-api
# DEPRECATED: Use nginx-standalone.conf or nginx-loadbalancer.conf instead
# SSL is terminated at the DO Load Balancer — droplet receives plain HTTP

upstream evento_api {
    # PM2 cluster workers all bind to the same port
    server 127.0.0.1:3000;

    # Keep connections alive to Fastify workers
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Tuned for burst traffic: queue requests rather than fail them
    proxy_read_timeout      30s;
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;

    location / {
        proxy_pass         http://evento_api;
        proxy_http_version 1.1;

        # Required for keepalive upstream connections
        proxy_set_header   Connection        "";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # LB sets this header so the app knows the original protocol
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Health check endpoint — used by DO Load Balancer
    location /health {
        proxy_pass http://evento_api;
        access_log off;
    }
}
