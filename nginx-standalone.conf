# /etc/nginx/sites-available/evento-api
# Standalone configuration with SSL via Let's Encrypt

upstream evento_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP server - redirects to HTTPS after certbot setup
server {
    listen 80;
    server_name eventoapi.com www.eventoapi.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS (after SSL is set up)
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server - certbot will add SSL certificates
server {
    listen 443 ssl http2;
    server_name eventoapi.com www.eventoapi.com;

    # SSL certificates (certbot will populate these)
    # ssl_certificate /etc/letsencrypt/live/eventoapi.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/eventoapi.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/evento-api.access.log;
    error_log /var/log/nginx/evento-api.error.log;

    # Tuned for burst traffic
    proxy_read_timeout      30s;
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;

    location / {
        proxy_pass         http://evento_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://evento_api;
        access_log off;
    }
}
