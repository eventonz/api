# /etc/nginx/sites-available/evento-api
# Load balancer configuration - SSL terminated at DO LB

upstream evento_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Logs
    access_log /var/log/nginx/evento-api.access.log;
    error_log /var/log/nginx/evento-api.error.log;

    # Tuned for burst traffic
    proxy_read_timeout      30s;
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;

    location / {
        proxy_pass         http://evento_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # LB sets this header so the app knows the original protocol
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /health {
        proxy_pass http://evento_api;
        access_log off;
    }
}
